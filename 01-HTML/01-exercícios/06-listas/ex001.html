<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>listas</title>
</head>
<body>
    <h1>trabalhando com listas</h1>
    <ol>
        <li>acordar</li>
        <li>orar</li>
        <li>ler a Bíblia</li>
    </ol>
    <h1>lista não ordenada</h1>
    <ul>
        <li>café</li>
        <li>pão</li>
        <li>ovo</li>
    </ul>
    <h1>lista de definições</h1>
    <dl>
        <dt>html</dt>
        <dd>linguagem de marcação para criação do conteúdo de um site</dd>
        <dt>css</dt>
        <dd>linguagem de marcação para criação de design de um site</dd>
    </dl>
</body>
</html>
