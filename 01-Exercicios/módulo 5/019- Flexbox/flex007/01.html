<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>flexbox</title>
    <style>
        div.pai {
            background-color: lightpink;
            display: flex;
            flex-flow: row wrap;
        }
        div.filho {
            background-color: lightblue;
           border: 1px solid black;
           text-align: center;
           padding: 20px;
        }
    </style>
</head>
<body>
    <div class="pai">
        <div class="filho" style="order: 5;">a</div>
        <div class="filho" style="order: 7;">b</div>
        <div class="filho" style="order: 3;">c</div>
        <div class="filho" style="order: 4;">d</div>
        <div class="filho" style="order: 2;">e</div>
        <div class="filho" style="order: 6;">f</div>
        <div class="filho" style="order: 1;">g</div>
    </div>
</body>
</html>
