<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>flexbox</title>
    <style>
        div.pai {
            background-color: lightpink;
            display: flex;
            flex-flow: row wrap;
        }
        div.filho {
            background-color: lightblue;
           border: 1px solid black;
           text-align: center;
            flex-basis: 150px;
        }
    </style>
</head>
<body>
    <div class="pai">
        <div class="filho">aaaaaaa</div>
        <div class="filho">bbbbbvb</div>
        <div class="filho">cccccc</div>
        <div class="filho">dddddd</div>
        <div class="filho">eeeeee</div>
        <div class="filho">fffff</div>
        <div class="filho">ggggg</div>
    </div>
</body>
</html>
