<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>flexbox</title>
    <style>
        div.pai {
            background-color: lightpink;
            display: flex;
            flex-flow: row nowrap;
        }
        div.filho {
            background-color: lightblue;
           border: 1px solid black;
           text-align: center;
           flex-basis: auto;
        }
    </style>
</head>
<body>
    <div class="pai">
        <div class="filho">aaaaaa</div>
        <div class="filho">bbbbb</div>
        <div class="filho">cccccc</div>
        <div class="filho">d</div>
        <div class="filho">eee</div>
        <div class="filho">ff</div>
        <div class="filho">gggg</div>
    </div>
</body>
</html>
