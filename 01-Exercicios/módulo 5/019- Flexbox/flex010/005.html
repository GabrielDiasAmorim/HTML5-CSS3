<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>flexbox</title>
    <style>
        div.pai {
            background-color: lightpink;
            display: flex;
            flex-flow: row wrap;
        }
        div.filho {
            background-color: lightblue;
           border: 1px solid black;
           text-align: center;
            
            flex-basis: 150px; /*padrao (a caixa/item tera o tamanho do conteúdo)*/

            flex-shrink: 1; /*padrao (pode diminuir)*/
            flex-grow: 1; /*padrao ( pode crescer)*/
        }
    </style>
    <!--ele pode diminuir e pode crescer so que ira quebra ao crescer demais, so que na linha abaixo ele ira ocupar toda a linha (de uma ponta a outra)-->
</head>
<body>
    <div class="pai">
        <div class="filho">a</div>
        <div class="filho">b</div>
        <div class="filho">c</div>
    </div>
</body>
</html>
