<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>flexbox</title>
    <style>
        div.pai {
            background-color: lightpink;
            display: flex;
            flex-flow: row nowrap;
        }
        div.filho {
            background-color: lightblue;
           border: 1px solid black;
           text-align: center;
            
            flex-basis: 200px; /
        }
        #b1 {
            
            flex-shrink: 1;
        }
    </style>
</head>
<body>
    <div class="pai">
        <div class="filho">a</div>
        <div class="filho" id="b1">b</div>
        <div class="filho">c</div>
    </div>
</body>
</html>
