<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pseudo Clase hover</title>
    <style>
        p a:hover{
            background-color: black;
        }
    </style>
</head>
<body>
    <h1>quando passar o mause o link muda de cor</h1>
    <p><a href="https://github.com/GabrielDiasAmorim" target="_blank">Github</a></p>
</body>
</html>
